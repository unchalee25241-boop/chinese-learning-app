kind = "web"
previewPath = "/"
title = "Chinese Learning App"
version = "1.0.0"
id = "artifacts/chinese-learning"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24679

[services.development]
run = "pnpm --filter @workspace/chinese-learning run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chinese-learning", "run", "build" ]
publicDir = "artifacts/chinese-learning/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24679"
BASE_PATH = "/"
